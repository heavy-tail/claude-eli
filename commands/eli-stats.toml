description = "Show current ELI stage and usage stats"
prompt = """
Show the user's ELI progress card.

Read the current stage from the SessionStart context (the "ELI MODE ACTIVE — current stage: X" line).
Read install date and session counts from ~/.config/eli/metadata.json (XDG respected; Windows %APPDATA%/eli/) if it exists. If the user's data is limited (new install), note that.

Render like:

```
[stage badge] ELI stats

Current stage: [stage emoji + name]
Installed: [days since install, or "today"]
Sessions so far: [approximate count, or "first session"]

Stage descriptions (simplification strength × passes):
  🎓 adult: "이해하기 쉽게" ×1, lossless — every detail preserved + structure
  🧒 kid:   "아주 쉽게" ×1 — strong simplification, recommended path flagged (default)
  👶 baby:  "아주 쉽게" ×2 — second-pass essence
  ✨ auto:  Claude picks per question

Suggested next:
  - On adult? Try /eli kid for the default sweet spot, or /eli raw for uncut Claude.
  - On kid? Try /eli baby for the most aggressive simplification, or /eli adult for lossless detail.
  - On baby? Try /eli kid for slightly more detail, or /eli auto to let Claude pick per question.
  - On auto? Try /eli kid (or another fixed stage) for a consistent register.
```

Keep it concise (no paragraph). If no data yet, say: "Installed today — /eli-stats shows more once you've used it a while."
"""
