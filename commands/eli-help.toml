description = "Claude ELI — command reference card"
prompt = """
Render this reference card exactly as shown, inside a single fenced code block. Do not paraphrase,
do not add explanations before or after.

```
🧒 ELI — commands

Stage
  /eli level         show menu with examples
  /eli easier        ↓ one step (more compressed)
  /eli harder        ↑ one step (more detail)
  /eli baby          jump to 👶 baby  (deepest translation, length = topic-required)
  /eli kid           jump to 🧒 kid   (light translation, concise — default)
  /eli adult         jump to 🎓 adult (near-raw but easier than raw)
  /eli auto          ✨ Claude picks depth per question

Switch
  /eli off           disable for this session (= uncut Claude)
  /eli on            re-enable
  /eli raw           this response only: raw Claude (no ELI filter)

Extra
  /eli-glossary      jargon from previous answer with plain defs
  /eli-stats         your evolution progress
  /eli-help          this card

Natural (just say it, no slash)
  "다시" / "again" / "한번 더"     re-translate previous answer
  "stop eli" / "normal mode"       disable for session
  "eli mode" / "talk like eli"     re-enable
```
"""
