description = "Show current evolution stage and usage stats"
prompt = """
Show the user's ELI progress card.

Read the current stage from the SessionStart context (the "ELI MODE ACTIVE — current stage: X" line).
Read install date and session counts from ~/.config/eli/metadata.json (XDG respected; Windows %APPDATA%/eli/) if it exists. If the user's data is limited (new install), note that.

Render like:

```
[stage badge] ELI stats

Current stage: [stage name] ([N]/3)
Installed: [days since install, or "today"]
Sessions so far: [approximate count, or "first session"]

Next stage: [stage+1 name + emoji, or "you're at Adult — try /eli off for uncut Claude"]
Suggested: [
  stage 1: "Baby — deepest translation. Analogies and everyday words. Try /eli harder for less translation."
  stage 2: "Kid — light translation, pretty concise (the sweet spot). Try /eli harder for the near-raw, structured register."
  stage 3: "Adult — lossless restructuring of raw (structure + frame + TL;DR, no new content). For fully raw Claude, /eli raw one-time or /eli off for the session."
  auto:    "Auto — Claude picks depth per question. Try /eli kid (or another fixed stage) for a consistent register."
]
```

Keep it concise (no paragraph). If no data yet, say: "Installed today — /eli-stats shows more once you've used it a while."
"""
